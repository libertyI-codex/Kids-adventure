<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ぬりえ設定プレビュー</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6fbf2;
      color: #24312b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 18px; }
    .page { width: min(980px, 100%); margin: 0 auto; display: grid; gap: 14px; }
    .panel {
      padding: 14px;
      border: 1px solid #d4e0d0;
      border-radius: 14px;
      background: #fffdf8;
      box-shadow: 0 12px 30px rgba(66, 92, 72, .10);
    }
    h1, h2, h3, p { margin-top: 0; }
    .muted { color: #617168; }
    .preview-frame {
      width: min(390px, 100%);
      margin: 0 auto;
      padding: 10px;
      border: 1px dashed #9eb49f;
      border-radius: 16px;
      background: #f9fff7;
      overflow-x: hidden;
    }
    .rows { display: grid; gap: 9px; }
    .row {
      display: grid;
      grid-template-columns: 42px 48px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 9px;
      border: 1px solid #d5dfd0;
      border-radius: 12px;
      background: white;
    }
    .row.is-dragging { border-style: dashed; background: #f1ffe9; }
    .row.is-invalid { border-color: #d98a62; background: #fff6ee; }
    .handle {
      min-height: 54px;
      border: 1px solid #b9ceb9;
      border-radius: 10px;
      background: #edf8e8;
      color: #34583a;
      font-size: 1.25rem;
      font-weight: 900;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .icon {
      display: grid;
      place-items: center;
      min-height: 48px;
      border-radius: 10px;
      background: #f3f8f1;
      font-size: 1.6rem;
    }
    .main { min-width: 0; }
    .main h3 { margin: 0 0 4px; font-size: .98rem; }
    .controls {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 40px;
      gap: 6px;
      align-items: end;
    }
    label { display: grid; gap: 3px; font-size: .76rem; font-weight: 800; }
    input {
      width: 100%;
      min-height: 42px;
      padding: 8px;
      border: 1px solid #c8d7cb;
      border-radius: 10px;
      text-align: center;
      font-weight: 900;
    }
    button {
      min-height: 42px;
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      background: #e5f2df;
      color: #24312b;
      font-weight: 900;
      white-space: nowrap;
    }
    button.primary { background: #2f7d45; color: white; }
    button.warn { background: #fff0d0; }
    button:disabled { opacity: .45; }
    .order-controls {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .actions { display: grid; gap: 8px; grid-template-columns: 1fr; margin-top: 12px; }
    .error { min-height: 1em; margin: 4px 0 0; color: #9a3b1d; font-size: .82rem; font-weight: 800; }
    .status { min-height: 1.2em; font-weight: 800; }
    .summary-grid { display: grid; gap: 8px; }
    @media (min-width: 760px) {
      .actions { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>ぬりえ設定プレビュー</h1>
      <p class="muted">本番localStorageは使わず、メモリ上のテストデータだけで動きます。</p>
    </section>
    <section class="panel summary-grid" aria-live="polite">
      <div>
        <h2>確認項目</h2>
        <p>0スター、999スター、不正入力、保存、保存しない、標準設定へ戻す、上下移動、ドラッグ移動を確認します。</p>
      </div>
      <div>
        <h2>進行データ</h2>
        <p><span id="progress-label">解放済み: ちょうちょ / 未解放: ほか</span></p>
        <p class="muted">スター数変更だけでは解放済み状態やスター残高を変更しません。</p>
      </div>
    </section>
    <section class="preview-frame">
      <div class="panel">
        <h2>ぬりえ設定</h2>
        <p class="muted">ひつようなスターと、ならびじゅんを変更できます。</p>
        <div id="rows" class="rows"></div>
        <p id="status" class="status" aria-live="polite"></p>
        <div class="actions">
          <button class="primary" id="save">変更を保存</button>
          <button id="discard">保存しない</button>
          <button class="warn" id="reset">標準設定へ戻す</button>
          <button id="make-invalid">不正入力を入れる</button>
        </div>
      </div>
    </section>
  </main>
  <script>
    (function () {
      "use strict";
      var templates = [
        ["coloring_butterfly_001", "🦋", "ちょうちょ", 4],
        ["coloring_flower_001", "🌼", "おはな", 8],
        ["coloring_rabbit_001", "🐰", "うさぎ", 12],
        ["coloring_cat_001", "🐱", "ねこ", 16],
        ["coloring_dolphin_001", "🐬", "イルカ", 20],
        ["coloring_dinosaur_001", "🦖", "きょうりゅう", 24],
        ["coloring_horse_001", "🐴", "うま", 28],
        ["coloring_lion", "🦁", "ライオン", 32],
        ["coloring_panda", "🐼", "パンダ", 36],
        ["coloring_grasshopper", "🦗", "バッタ", 40]
      ];
      var saved = standard();
      var rows = document.getElementById("rows");
      var status = document.getElementById("status");
      var drag = null;

      function standard() {
        var costs = {};
        templates.forEach(function (item) { costs[item[0]] = item[3]; });
        return { order: templates.map(function (item) { return item[0]; }), starCosts: costs };
      }
      function toHalf(value) {
        return String(value == null ? "" : value).replace(/[０-９]/g, function (char) {
          return String.fromCharCode(char.charCodeAt(0) - 65248);
        });
      }
      function templateById(id) {
        return templates.filter(function (item) { return item[0] === id; })[0];
      }
      function parse(value) {
        var raw = toHalf(value).trim();
        if (!/^\d+$/.test(raw)) return null;
        var n = Number(raw);
        return n >= 0 && n <= 999 ? n : null;
      }
      function current(showErrors) {
        var ok = true;
        var order = [];
        var starCosts = {};
        Array.prototype.forEach.call(rows.querySelectorAll("[data-row]"), function (row) {
          var id = row.getAttribute("data-row");
          var input = row.querySelector("input");
          var value = parse(input.value);
          var err = row.querySelector("[data-error]");
          row.classList.remove("is-invalid");
          err.textContent = "";
          order.push(id);
          if (value === null) {
            ok = false;
            if (showErrors) {
              row.classList.add("is-invalid");
              err.textContent = "0から999の整数にしてください";
            }
          } else {
            input.value = String(value);
            starCosts[id] = value;
          }
        });
        return { ok: ok, data: { order: order, starCosts: starCosts } };
      }
      function updateButtons() {
        var all = Array.prototype.slice.call(rows.querySelectorAll("[data-row]"));
        all.forEach(function (row, index) {
          row.querySelector("[data-up]").disabled = index === 0;
          row.querySelector("[data-down]").disabled = index === all.length - 1;
        });
      }
      function render(data) {
        rows.innerHTML = "";
        data.order.forEach(function (id, index) {
          var item = templateById(id);
          var row = document.createElement("div");
          row.className = "row";
          row.setAttribute("data-row", id);
          row.innerHTML = '<button class="handle" data-handle aria-label="' + item[2] + 'をドラッグで移動">↕</button>' +
            '<div class="icon" aria-hidden="true">' + item[1] + '</div>' +
            '<div class="main"><h3>' + item[1] + ' ' + item[2] + '</h3><p class="muted">標準 ' + item[3] + '</p>' +
            '<div class="controls"><button data-minus aria-label="' + item[2] + 'を1減らす">－</button><label>必要スター<input inputmode="numeric" value="' + data.starCosts[id] + '"></label><button data-plus aria-label="' + item[2] + 'を1増やす">＋</button></div>' +
            '<p class="error" data-error></p></div><div class="order-controls"><button data-up>上へ</button><button data-down>下へ</button></div>';
          rows.appendChild(row);
        });
        updateButtons();
        status.textContent = "";
      }
      rows.addEventListener("click", function (event) {
        var row = event.target.closest("[data-row]");
        if (!row) return;
        if (event.target.hasAttribute("data-minus") || event.target.hasAttribute("data-plus")) {
          var input = row.querySelector("input");
          var value = parse(input.value);
          if (value === null) value = saved.starCosts[row.getAttribute("data-row")];
          value += event.target.hasAttribute("data-plus") ? 1 : -1;
          input.value = String(Math.max(0, Math.min(999, value)));
          status.textContent = "未保存の変更があります";
        }
        if (event.target.hasAttribute("data-up") && row.previousElementSibling) rows.insertBefore(row, row.previousElementSibling);
        if (event.target.hasAttribute("data-down") && row.nextElementSibling) rows.insertBefore(row.nextElementSibling, row);
        updateButtons();
      });
      rows.addEventListener("input", function (event) {
        if (event.target.tagName === "INPUT") {
          event.target.value = toHalf(event.target.value);
          status.textContent = "未保存の変更があります";
        }
      });
      rows.addEventListener("pointerdown", function (event) {
        if (!event.target.hasAttribute("data-handle")) return;
        drag = { row: event.target.closest("[data-row]"), id: event.pointerId, y: event.clientY, active: false };
        try { event.target.setPointerCapture(event.pointerId); } catch (error) {}
      });
      rows.addEventListener("pointermove", function (event) {
        if (!drag || drag.id !== event.pointerId) return;
        if (!drag.active && Math.abs(event.clientY - drag.y) < 6) return;
        drag.active = true;
        drag.row.classList.add("is-dragging");
        event.preventDefault();
        var target = null;
        Array.prototype.forEach.call(rows.querySelectorAll("[data-row]"), function (row) {
          if (row === drag.row || target) return;
          var rect = row.getBoundingClientRect();
          if (event.clientY < rect.top + rect.height / 2) target = row;
        });
        if (target) rows.insertBefore(drag.row, target);
        else rows.appendChild(drag.row);
        updateButtons();
        status.textContent = "未保存の変更があります";
      });
      function endDrag() {
        if (drag && drag.row) drag.row.classList.remove("is-dragging");
        drag = null;
      }
      rows.addEventListener("pointerup", endDrag);
      rows.addEventListener("pointercancel", endDrag);
      document.getElementById("save").addEventListener("click", function () {
        var result = current(true);
        if (!result.ok) {
          status.textContent = "入力を確認してください";
          return;
        }
        saved = result.data;
        status.textContent = "ぬりえ設定を保存しました";
      });
      document.getElementById("discard").addEventListener("click", function () {
        render(saved);
        status.textContent = "保存しないで戻しました";
      });
      document.getElementById("reset").addEventListener("click", function () {
        if (!confirm("スターの数と、ぬりえの並びをはじめの設定に戻します。")) return;
        saved = standard();
        render(saved);
        status.textContent = "標準設定に戻しました";
      });
      document.getElementById("make-invalid").addEventListener("click", function () {
        var first = rows.querySelector("input");
        first.value = "1000.5";
        current(true);
        status.textContent = "不正入力の表示例です";
      });
      render(saved);
    })();
  </script>
</body>
</html>
