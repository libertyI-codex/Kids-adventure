<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>こどもの冒険 ぬりえプレビュー Ver.1.0 試作9</title>
  <style>
    :root { --ink:#24312b; --muted:#657368; --line:#d7e6d5; --bg:#f5fbf2; --panel:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; padding:20px; background:var(--bg); color:var(--ink); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    h1 { margin:0 0 8px; }
    .note { color:var(--muted); margin-bottom:18px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
    .card { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:14px; box-shadow:0 8px 20px rgba(40,70,45,.1); }
    .card.is-focus { border-color:#69b58b; box-shadow:0 0 0 3px rgba(105,181,139,.14), 0 8px 20px rgba(40,70,45,.1); }
    .meta { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 12px; }
    .badge { padding:4px 8px; border-radius:999px; background:#eef7ec; color:#2f7837; font-size:.84rem; font-weight:800; }
    .badge.neutral { background:#f1f5f9; color:#475569; }
    .previews, .large-row { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; align-items:start; }
    .preview { border:1px solid var(--line); border-radius:12px; background:#fff; padding:8px; min-width:0; }
    .preview.small svg { width:120px; height:90px; display:block; margin:auto; }
    .preview.large svg { width:100%; max-height:240px; display:block; }
    .large-row { margin-top:12px; }
    .preview-label { margin:0 0 6px; color:var(--muted); font-size:.8rem; font-weight:800; }
    code { display:block; white-space:normal; overflow-wrap:anywhere; margin-top:10px; color:var(--muted); font-size:.82rem; }
    @media (max-width:520px){ .previews, .large-row { grid-template-columns:1fr; } }
  </style>
  <script src="../js/constants.js?v=10p9"></script>
  <script src="../js/coloring.js?v=10p9"></script>
</head>
<body>
  <h1>ぬりえプレビュー Ver.1.0 試作9</h1>
  <p class="note">正式採用した6種類を重点確認します。未着色、サンプル着色、120px表示、hit-area数、旧regionColors変換を確認できます。</p>
  <main id="preview-root" class="grid"></main>
  <script>
    (function () {
      "use strict";
      var KA = window.KodomoAdventure;
      var root = document.getElementById("preview-root");
      var palette = KA.constants.COLOR_PALETTE.map(function (color) { return color.value; });
      var focusIds = ["coloring_rabbit_001", "coloring_dolphin_001", "coloring_dinosaur_001", "coloring_horse_001", "coloring_lion", "coloring_grasshopper"];
      var legacySamples = {
        coloring_rabbit_001: { ear_left: "#F472B6", cheeks: "#EF4444", body: "#FFFFFF" },
        coloring_dolphin_001: { body: "#38BDF8", nose: "#BAE6FD", tail: "#3B82F6" },
        coloring_dinosaur_001: { legs: "#22C55E", spikes: "#A3E635", body: "#A3E635" },
        coloring_horse_001: { legs: "#92400E", hooves: "#111827", muzzle: "#FACC15" },
        coloring_lion: { mane: "#92400E", body: "#FACC15" },
        coloring_grasshopper: { abdomen: "#22C55E", back_leg: "#A3E635" }
      };
      function sampleColors(template, offset) {
        var colors = {};
        template.regionIds.forEach(function (regionId, index) { colors[regionId] = palette[(index + offset) % palette.length]; });
        return colors;
      }
      function hitAreaCount(svg) { return (svg.match(/class="hit-area"/g) || []).length; }
      root.innerHTML = KA.constants.COLORING_TEMPLATES.map(function (template, index) {
        var emptySvg = KA.coloring.renderTemplate(template.templateId, {}, "preview-svg");
        var sampleSvg = KA.coloring.renderTemplate(template.templateId, sampleColors(template, index), "preview-svg");
        var focus = focusIds.indexOf(template.templateId) >= 0;
        var normalized = legacySamples[template.templateId] ? KA.coloring.normalizeRegionColors(template.templateId, legacySamples[template.templateId]) : {};
        return [
          '<section class="card ' + (focus ? 'is-focus' : '') + '">',
          '<h2>' + template.icon + ' ' + template.title + '</h2>',
          '<div class="meta">',
          '<span class="badge">designVersion ' + template.designVersion + '</span>',
          '<span class="badge">領域 ' + template.regionIds.length + '</span>',
          '<span class="badge">hit-area ' + hitAreaCount(emptySvg) + '</span>',
          '<span class="badge neutral">' + template.templateId + '</span>',
          focus ? '<span class="badge">試作9重点</span>' : '',
          '</div>',
          '<div class="previews">',
          '<div class="preview small"><p class="preview-label">未着色 120px</p>' + emptySvg + '</div>',
          '<div class="preview small"><p class="preview-label">着色 120px</p>' + sampleSvg + '</div>',
          '</div>',
          '<div class="large-row">',
          '<div class="preview large"><p class="preview-label">大きな未着色</p>' + emptySvg + '</div>',
          '<div class="preview large"><p class="preview-label">大きな着色</p>' + sampleSvg + '</div>',
          '</div>',
          '<code>領域ID: ' + template.regionIds.join(', ') + '</code>',
          focus ? '<code>旧regionColors変換: ' + JSON.stringify(normalized) + '</code>' : '',
          '</section>'
        ].join("");
      }).join("");
    })();
  </script>
</body>
</html>
