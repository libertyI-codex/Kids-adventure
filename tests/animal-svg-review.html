<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>こどもの冒険 原画レビュー 試作9候補</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #65737a;
      --line: #d7e3dd;
      --soft-line: #e8f0ec;
      --bg: #f5faf7;
      --panel: #ffffff;
      --accent: #2f7d5f;
      --accent-soft: #e4f4ed;
      --warn: #8a5b14;
      --warn-soft: #fff3cf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(245, 250, 247, 0.94);
      backdrop-filter: blur(10px);
      padding: 16px clamp(14px, 4vw, 28px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 5vw, 2rem);
      letter-spacing: 0;
    }
    h2, h3 { letter-spacing: 0; }
    p { margin: 0; }
    button {
      min-height: 44px;
      border: 1px solid #b9d8ca;
      border-radius: 12px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 10px 14px;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    button[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
    main {
      padding: 18px clamp(12px, 4vw, 28px) 36px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .note {
      color: var(--muted);
      max-width: 980px;
      margin-bottom: 12px;
    }
    .warning {
      display: inline-block;
      margin-top: 10px;
      border: 1px solid #ecd58f;
      border-radius: 12px;
      background: var(--warn-soft);
      color: var(--warn);
      padding: 8px 10px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 360px), 1fr));
      gap: 18px;
      align-items: start;
    }
    .animal-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 12px 30px rgba(40, 75, 62, 0.08);
      overflow: hidden;
    }
    .animal-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border-bottom: 1px solid var(--soft-line);
      background: linear-gradient(180deg, #ffffff 0%, #f7fbf8 100%);
    }
    .animal-head h2 {
      margin: 0 0 6px;
      font-size: 1.24rem;
    }
    body.names-hidden .animal-name {
      display: none;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      border-radius: 999px;
      background: var(--accent-soft);
      color: #226449;
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.neutral {
      background: #f1f5f9;
      color: #475569;
    }
    .judgement {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 0.86rem;
      font-weight: 900;
    }
    .judgement.pass {
      background: #e3f7ed;
      color: #176c47;
    }
    .judgement.partial {
      background: #fff3cf;
      color: #8a5b14;
    }
    .judgement.remake {
      background: #fee2e2;
      color: #9f1239;
    }
    .body {
      padding: 14px;
    }
    .states {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .preview {
      border: 1px solid var(--soft-line);
      border-radius: 12px;
      background: #ffffff;
      padding: 10px;
      min-width: 0;
    }
    .preview h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.86rem;
    }
    .preview svg {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 3;
      background: #ffffff;
    }
    .preview.small svg {
      width: 120px;
      max-width: 100%;
      margin: 0 auto;
    }
    .comparison {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .comparison .preview svg {
      max-height: 170px;
    }
    .variant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
      gap: 14px;
    }
    .variant-card {
      border: 1px solid var(--soft-line);
      border-radius: 14px;
      background: #fbfefd;
      padding: 12px;
      min-width: 0;
    }
    .variant-card h3 {
      margin: 0 0 6px;
      font-size: 1.05rem;
    }
    .variant-card > p {
      min-height: 3.1em;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    .variant-card.is-picked {
      border-color: #49a879;
      box-shadow: 0 0 0 3px rgba(73, 168, 121, 0.16);
    }
    .variant-card.needs-work {
      border-color: #e5b84b;
      box-shadow: 0 0 0 3px rgba(229, 184, 75, 0.16);
    }
    .variant-card.rejected {
      opacity: 0.72;
      border-color: #f0a6a6;
    }
    .variant-states {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .review-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .review-actions button {
      min-height: 40px;
      border-radius: 10px;
      padding: 8px 6px;
      font-size: 0.82rem;
    }
    .review-actions button[data-choice="pick"] {
      border-color: #86c9a8;
      background: #edf9f2;
    }
    .review-actions button[data-choice="work"] {
      border-color: #e5c260;
      background: #fff7d6;
    }
    .review-actions button[data-choice="reject"] {
      border-color: #f1b2b2;
      background: #fff1f1;
    }
    .review-result {
      min-height: 1.6em;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.86rem;
    }
    .history {
      margin-top: 14px;
      border: 1px dashed #cbd8d1;
      border-radius: 12px;
      background: #f8fbf9;
      padding: 10px;
    }
    .history summary {
      cursor: pointer;
      font-weight: 900;
      color: #41524a;
    }
    .history .variant-grid {
      margin-top: 10px;
    }
    .details {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      border-top: 1px solid var(--soft-line);
      padding-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .details code {
      display: block;
      overflow-wrap: anywhere;
      color: #334155;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px;
      font-size: 0.82rem;
      line-height: 1.45;
    }
    .candidate-svg .color-regions path,
    .candidate-svg .color-regions polygon {
      cursor: pointer;
      outline: none;
    }
    .candidate-svg .color-regions path:focus,
    .candidate-svg .color-regions polygon:focus {
      filter: drop-shadow(0 0 4px rgba(47, 125, 95, 0.6));
    }
    .candidate-svg .outer-outline path {
      fill: none;
      stroke: #1f2933;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }
    .candidate-svg .inner-lines path,
    .candidate-svg .inner-lines line {
      fill: none;
      stroke: #2f3a42;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }
    .candidate-svg .face-details path,
    .candidate-svg .face-details circle,
    .candidate-svg .face-details ellipse {
      pointer-events: none;
    }
    .candidate-svg.silhouette path,
    .candidate-svg.silhouette polygon {
      fill: #111827;
      stroke: none;
    }
    @media (max-width: 520px) {
      .states,
      .comparison,
      .variant-states,
      .review-actions {
        grid-template-columns: 1fr;
      }
      .animal-head {
        grid-template-columns: 1fr;
      }
    }
  </style>

      function markFormalAdopted(source, label, title) {
        var variant = cloneAnimal(source);

        variant.variantTitle = title || source.variantTitle || source.name;

      function cloneAnimal(animal) {
        return JSON.parse(JSON.stringify(animal));
      }

      function makeVariant(templateId, variantLabel, variantTitle, description, next) {
        var base = animals.filter(function (animal) {
          return animal.templateId === templateId;
        })[0];
        var variant = cloneAnimal(base);
        variant.variantLabel = variantLabel;
        variant.variantTitle = variantTitle;
        variant.variantDescription = description;
        Object.keys(next).forEach(function (key) {
          variant[key] = next[key];
        });
        return variant;
      }

      function historyVariant(source, label, title) {
        var variant = cloneAnimal(source);
        variant.variantLabel = label;
        variant.variantTitle = title;
        variant.variantDescription = "折りたたみ履歴として残す不採用案です。";
        variant.reviewable = false;
        return variant;
      }

      function revisedVariant(source, label, title, description, next) {
        var variant = cloneAnimal(source);
        variant.variantLabel = label;
        variant.variantTitle = title;
        variant.variantDescription = description;
        variant.reviewable = true;
        Object.keys(next).forEach(function (key) {
          variant[key] = next[key];
        });
        return variant;
      }

      function applyCandidateRevision(templateId, next) {
        var target = animals.filter(function (animal) {
          return animal.templateId === templateId;
        })[0];
        if (!target) return;
        Object.keys(next).forEach(function (key) {
          target[key] = next[key];
        });
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char];
        });
      }

      function renderRegion(region, fill) {
        return '<path class="color-region" data-region-id="' + escapeHtml(region.id) + '" tabindex="0" d="' + region.d + '" fill="' + fill + '"/>';
      }

      function renderCandidate(animal, mode) {
        var colors = mode === "sample" ? colorMap(animal) : {};
        var title = mode === "silhouette" ? animal.name + " silhouette" : animal.name + " candidate";
        if (mode === "silhouette") {
          return [
            '<svg class="candidate-svg silhouette" viewBox="0 0 240 180" role="img" aria-label="' + escapeHtml(title) + '">',
            animal.silhouette.map(function (d) { return '<path d="' + d + '"/>'; }).join(""),
            '</svg>'
          ].join("");
        }
        return [
          '<svg class="candidate-svg" viewBox="0 0 240 180" role="img" aria-label="' + escapeHtml(title) + '">',
          '<g class="color-regions">',
          animal.regions.map(function (region) {
            return renderRegion(region, colors[region.id] || region.fallback || "#FFFFFF");
          }).join(""),
          '</g>',
          '<g class="outer-outline">',
          animal.outer.map(function (d) { return '<path d="' + d + '"/>'; }).join(""),
          '</g>',
          '<g class="inner-lines">',
          animal.inner.map(function (item) { return '<path d="' + item.d + '"/>'; }).join(""),
          '</g>',
          '<g class="face-details">',
          animal.face,
          '</g>',
          '</svg>'
        ].join("");
      }

      function renderOldSvg(animal) {
        if (!KA.coloring || !KA.coloring.renderTemplate) {
          return '<p>旧SVGを読み込めませんでした。</p>';
        }
        return KA.coloring.renderTemplate(animal.templateId, {}, "old-svg");
      }

      function oldTemplate(animal) {
        if (!KA.constants || !KA.constants.COLORING_TEMPLATES) return null;
        return KA.constants.COLORING_TEMPLATES.filter(function (template) {
          return template.templateId === animal.templateId;
        })[0] || null;
      }

      function normalizePath(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function candidatePaths(variant) {
        return variant.regions.map(function (region) { return normalizePath(region.d); })
          .concat(variant.outer.map(normalizePath))
          .concat(variant.inner.map(function (item) { return normalizePath(item.d || item); }))
          .concat([String(variant.face || "").replace(/\s+/g, " ").trim()]);
      }

      function productionCompareBlock(variant) {
        if (!KA.coloring || !KA.coloring.getLayeredDefinition) {
          return '<div><strong>本番比較:</strong> <span class="badge neutral">未対応</span></div>';
        }
        var definition = KA.coloring.getLayeredDefinition(variant.templateId);
        if (!definition) return '<div><strong>本番比較:</strong> <span class="badge neutral">定義なし</span></div>';
        var candidateRegionIds = variant.regions.map(function (region) { return region.id; }).join(",");
        var productionRegionIds = definition.regions.map(function (region) { return region.id; }).join(",");
        var productionPaths = definition.regions.map(function (region) { return normalizePath(region.d); })
          .concat(definition.outer.map(normalizePath))
          .concat(definition.inner.map(function (item) { return normalizePath(item.d || item); }))
          .concat([String(definition.face || "").replace(/\s+/g, " ").trim()]);
        var sameViewBox = definition.viewBox === "0 0 240 180";
        var sameRegions = candidateRegionIds === productionRegionIds;
        var samePaths = candidatePaths(variant).join("|") === productionPaths.join("|");
        return [
          '<div><strong>本番比較:</strong> ',
          '<span class="badge ' + (sameViewBox ? '' : 'neutral') + '">viewBox ' + (sameViewBox ? '一致' : '不一致') + '</span> ',
          '<span class="badge ' + (sameRegions ? '' : 'neutral') + '">領域ID ' + (sameRegions ? '一致' : '不一致') + '</span> ',
          '<span class="badge ' + (samePaths ? '' : 'neutral') + '">path ' + (samePaths ? '一致' : '不一致') + '</span> ',
          '<span class="badge neutral">designVersion ' + (definition.designVersion || '-') + '</span></div>',
          '<code>候補path: ' + escapeHtml(candidatePaths(variant).join(' | ').slice(0, 900)) + '</code>'
        ].join("");
      }

      function variantCard(animal, variant, index, isMulti) {
        var label = variant.variantLabel || (isMulti ? "候補" : "合格候補");
        var title = variant.variantTitle || (isMulti ? "レビュー候補" : "現在の合格候補");
        var description = variant.variantDescription || (isMulti ? "レビュー対象の候補です。" : "合格済みのため、第2回候補をそのまま保持しています。");
        var canReview = isMulti && variant.reviewable !== false;
        return [
          '<article class="variant-card" data-template-id="' + escapeHtml(animal.templateId) + '" data-variant-index="' + index + '">',
          '<h3>' + escapeHtml(label + " / " + title) + '</h3>',
          '<p>' + escapeHtml(description) + '</p>',
          '<div class="variant-states">',
          '<div class="preview"><h3>黒一色</h3>' + renderCandidate(variant, "silhouette") + '</div>',
          '<div class="preview"><h3>未着色</h3>' + renderCandidate(variant, "line") + '</div>',
          '<div class="preview"><h3>サンプル着色</h3>' + renderCandidate(variant, "sample") + '</div>',
          '<div class="preview small"><h3>120px</h3>' + renderCandidate(variant, "line") + '</div>',
          '</div>',
          '<div class="details">',
          '<div><strong>領域数:</strong> ' + variant.regions.length + '</div>',
          '<div><strong>outer-outline path数:</strong> ' + variant.outer.length + '</div>',
          '<div><strong>inner-lines数:</strong> ' + variant.inner.length + '</div>',
          '<div><strong>領域ID:</strong><code>' + variant.regions.map(function (region) { return region.id; }).join(", ") + '</code></div>',
          '</div>',
          canReview ? [
            '<div class="review-actions" aria-label="レビュー選択">',
            '<button type="button" data-choice="pick">この案がよい</button>',
            '<button type="button" data-choice="work">一部修正</button>',
            '<button type="button" data-choice="reject">不採用</button>',
            '</div>',
            '<div class="review-result" aria-live="polite"></div>'
          ].join("") : '',
          '</article>'
        ].join("");
      }

      function card(animal) {
        var old = oldTemplate(animal);
        var oldVersion = old ? old.designVersion : "-";
        var judgement = judgementById[animal.templateId] || { label: "確認中", className: "neutral" };
        var variants = activeVariantById[animal.templateId] || [animal];
        var history = rejectedHistoryById[animal.templateId] || [];
        var isMulti = variants.length > 1;
        return [
          '<section class="animal-card">',
          '<div class="animal-head">',
          '<div>',
          '<h2><span class="animal-name">' + escapeHtml(animal.name) + '</span><span class="hidden-label" aria-hidden="true"></span></h2>',
          '<p>' + escapeHtml(isMulti ? "未合格のため、姿勢とシルエットが異なる3案を比較します。" : animal.intent) + '</p>',
          '</div>',
          '<div class="meta">',
          '<span class="judgement ' + judgement.className + '">判定: ' + judgement.label + '</span>',
          '<span class="badge">' + escapeHtml(animal.templateId) + '</span>',
          '<span class="badge">designVersion候補 ' + animal.candidateVersion + '</span>',
          '<span class="badge neutral">本番現行 ' + oldVersion + '</span>',
          '</div>',
          '</div>',
          '<div class="body">',
          '<div class="variant-grid">',
          variants.map(function (variant, index) {
            return variantCard(animal, variant, index, isMulti);
          }).join(""),
          '</div>',
          history.length ? [
            '<details class="history">',
            '<summary>不採用履歴を見る</summary>',
            '<div class="variant-grid">',
            history.map(function (variant, index) {
              return variantCard(animal, variant, index, true);
            }).join(""),
            '</div>',
            '</details>'
          ].join("") : '',
          '</div>',
          '</section>'
        ].join("");
      }

      root.innerHTML = animals.map(card).join("");

      root.addEventListener("click", function (event) {
        var button = event.target.closest ? event.target.closest("button[data-choice]") : null;
        if (!button) return;
        var cardEl = button.closest(".variant-card");
        if (!cardEl) return;
        cardEl.classList.remove("is-picked", "needs-work", "rejected");
        var labels = {
          pick: "この案がよい",
          work: "一部修正",
          reject: "不採用"
        };
        var classes = {
          pick: "is-picked",
          work: "needs-work",
          reject: "rejected"
        };
        var choice = button.getAttribute("data-choice");
        cardEl.classList.add(classes[choice]);
        var result = cardEl.querySelector(".review-result");
        if (result) result.textContent = "選択: " + labels[choice];
      });

      toggle.addEventListener("click", function () {
        var pressed = toggle.getAttribute("aria-pressed") === "true";
        toggle.setAttribute("aria-pressed", pressed ? "false" : "true");
        toggle.textContent = pressed ? "動物名を隠す" : "動物名を表示する";
        document.body.classList.toggle("names-hidden", !pressed);
      });
    })();
  </script>
</body>
</html>
